<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="homework2_img.css">
        <title>作业2</title>
    </head>
    <body>
        <div class="main">
            <card class="left">
                <h1><strong>1.普通图片展示</strong></h1>
                <img src="image.png" alt="机器人图片" title="机器人图片" loading="lazy" class="smaller-img">
                <p>使用了src、alt、title、loading。</p>
            </card>
            <card class="right">
                <h1><strong>2.图片作为链接</strong></h1>
                <a href="https://developer.mozilla.org/zh-CN/docs/web/HTML/Element/img" target="_blank" rel="noopener noreferrer">
                    <img src="image.png" alt="点击可跳转文档的图片" title="点击可跳转文档的图片">
                </a>
                <p>点击上方图片，将在新标签页打开文档。</p>
            </card>
        </div>
    </body>
</html>
