<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片标签img演示</title>
</head>
<body>
    <div class="card">
        <h1>图片标签img演示</h1>
        <figure>
            <img
                src="./image.html"
                alt="示例横幅照片"
                width="720"
                height="240"
                title="这是title提示文字"
                loading="lazy"
            >
            <figcaption>示例1：基础属性(src/alt/width/height/title/loading)</figcaption>
        </figure>

        <figure>
            <a href="https://developer.mozilla.org/zh-CN/docs/web/HTML/Element/img" target="_blank" rel="noopener noreferrer">
                <img
                    src="./image.html"
                    alt="点击可跳转文档的图片"
                    width="320"
                    height="180"
                >
            </a>
            <figcaption>示例2：图片作为链接</figcaption>
        </figure>

        <p>建议记住：<code>alt</code>必写，用于无障碍与图片加载失败时的替代文本</p>
    </div>
</body>
</html>
