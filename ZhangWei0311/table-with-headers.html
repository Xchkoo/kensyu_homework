<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>第一个表格练习</title>
        <link rel="stylesheet" href="minimal-table.css">
    </head>
    <body>
        <h1>使用&lt;th&nbsp;元素添加标题    </h1>
        <table>
            <caption>本周宠物体检预约</caption>
            <tr>
                <th scope="col">诺基</th>
                <th scope="col">弗诺尔</th> 
                <th scope="col">艾拉</th>
                <th scope="col">胡安</th>
            </tr>
            <tr>
                <th scope="row">品种</th>
                <td>杰克罗斯犬</td>
                <td>贵宾犬</td>
                <td>流浪犬</td>
                <td>可卡犬</td>
            </tr>
            <tr>
                <th scope="row">年龄</th>
                <td>16</td>
                <td>9</td>
                <td>10</td>
                <td>5</td>
            </tr>
        </table>
    </body>
</html>
