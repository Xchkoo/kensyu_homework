<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>第一个表格练习</title>
        <link rel="stylesheet" href="minimal-table.css">
    </head>
    <body>
        <h1>创建你的第一个表格</h1>
        <table>
            <tr>
                <td>我是第一个单元格</td>
                <td>我是第二个单元格</td>
                <td>我是第三个单元格</td>
                <td>我是第四个单元格</td>
            </tr>
            <tr>
                <td>我是第二行的第一个单元格</td>
                <td>我是第二行的第二个单元格</td>
                <td>我是第二行的第三个单元格</td>
                <td>我是第二行的第四个单元格</td>
            </tr>
        </table>
    </body>
</html>
