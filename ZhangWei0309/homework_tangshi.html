        <title>唐诗赏析</title>
    </head> 
    <body>
        <h1>唐诗赏析</h1>
        <h2>静夜思</h2>
        <h3>作者：<span style="font-weight:400">李白</span></h3>
        <hr>
        <p>床前明<ruby>月<rt>yue</rt></ruby>光，</p>
        <p>疑是地上霜。</p>
        <p>举头望明月，</p>
        <p>低头思故乡。</p>
        <p style="margin-top: 25px;">
            <em>注释：</em>疑：好像。举头：抬头。
        </p>
        <blockquote>
                译文：明亮的月光洒在床前，好像地上铺了一层霜。抬头望着天上的明月，低头思念远方的家乡。
        </blockquote>
    </body>
