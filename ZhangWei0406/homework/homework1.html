<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>日本語試験</title>
        <link rel="stylesheet" href="css/homework1.css">
        <script src="js/homework1.js" defer></script>
    </head>
    <body>
        <div class="container">
        <h1>日本語試験（1問）</h1>
        <p>
            次の文の（ ）に入る最も適切な語を選びなさい。<br>
            私は毎朝7時（ ）起きます。
        </p>
        <div class="options">
            <label><input type="radio" name="q">1. に</label>
            <label><input type="radio" name="q">2. で</label>
            <label><input type="radio" name="q">3. を</label>
            <label><input type="radio" name="q">4. と</label>
        </div>
        </div>

        <div id="timer">残り 10 秒</div>
    </body>
</html>
