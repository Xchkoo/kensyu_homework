<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>班级作业评分表</title>
        <link rel="stylesheet" href="homework1.css">
    </head>
    <body>
        <h1>班级作业评分表（样式改造示例）</h1>
        <table>
            <thead>
                <tr>
                    <th>班级</th>
                    <th>作业主题</th>
                    <th>提交时间</th>
                    <th>评语</th>
                    <th>得分</th>
                </tr>
            </thead>
            <tbody>
                <tr class="grey-background">
                    <td>张三</td>
                    <td>语义化页面结构</td>
                    <td>2026-03-17 20:31</td>
                    <td>结构清晰，命名规范</td>
                    <td class="score-high">96</td>
                </tr>
                <tr>
                    <td>李四</td>
                    <td>表格与表单综合</td>
                    <td>2026-03-17 21:05</td>
                    <td>功能完整，细节可继续优化。</td>
                    <td class="score-mid">88</td>
                </tr>
                <tr class="highlight">
                    <td>王五</td>
                    <td>图片与链接练习</td>
                    <td>2026-03-18 08:42</td>
                    <td>样式基础正确，交互状态较少。</td>
                    <td class="score-low">76</td>
                </tr>
                <tr class="grey-background">
                    <td colspan="4">平均分</td>
                    <td>86.7</td>
                </tr>
            </tbody>
        </table>
    </body>
</html>
