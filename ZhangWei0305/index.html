    <main class="login-shell">
        <section class="login-panel">
            <div class="brand">
                <div class="brand__icon">
                    <span class="brand__triangle"></span>
                </div>
                <div>
                    <div class="brand__eyebrow">My website</div>
                    <div class="brand__name">Xchkoo website</div>
                </div>
            </div>

            <form class="login-form" id="loginForm" novalidate="">
                <div class="field">
                    <label for="identity">メールアドレスまたは会員ID</label>
                    <input id="identity" name="identity" type="text" autocomplete="username" placeholder="you@example.jp">
                    <small class="field__error"></small>
                </div>

                <div class="field">
                    <label for="password">パスワード</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" placeholder="6文字以上で入力してください">
                    <small class="field__error"></small>
                </div>

                <button class="button button--primary" type="submit">ログイン</button>

                <div class="form-links">
                    <a href="#">パスワードをお忘れですか？</a>
                    <a href="#">法人契約・学校アカウントでログイン</a>
                </div>

                <div class="divider">
                    <span>または</span>
                </div>

                <button class="button button--ghost" type="button">新規会員登録</button>

                <p class="form-status" id="formStatus" aria-live="polite"></p>
            </form>

            <footer class="login-footer">
                <p>Copyright © 2026 Xchkoo. All rights reserved.</p>
                <div class="footer-links">
                    <a href="#">利用規約</a>
                    <a href="#">プライバシーポリシー</a>
                </div>
            </footer>
        </section>

                <h1>Xmem</h1>
