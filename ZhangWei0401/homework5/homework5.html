<!DOCTYPE html>
<html lang="zh">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>用户注册</title>
        <link rel="stylesheet" href="homework5.css">
    </head>
    <body>
        <div class="rigister-box">
            <h1>用户注册</h1>

            <label>用户名</label>
            <input type="text" id="username" placeholder="请输入用户名">
        
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码">

            <label>确认密码</label>
            <input type="password" id="confirmPassword" placeholder="请再次输入密码">

            <button onclick="register()">注册</button>
            
            <div class="rules">
                <p>规则：</p>
                <ol>
                    <li>用户名只能包含字母和数字。</li>
                    <li>密码8-16 位。</li>
                    <li>密码必须包含：大写字母、小写字母、数字。</li>
                    <li>两次输入的密码必须一致。</li>
                </ol>
            </div>
        </div>
        <script src="homework5.js"></script>
    </body>
</html>
