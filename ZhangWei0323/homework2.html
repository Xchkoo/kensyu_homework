<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Formatting Techniques</title>
<link rel="stylesheet" href="homework2.css">
</head>

<body>
<div class="container">
    <h1>5 Formatting Techniques for Long-Form Content</h1>

    <div class="grid">

        <div class="card">
            <div>
                <span class="number">1</span>
                <span class="title">Summary</span>
            </div>

            <div class="summary-box">
                <strong>Key Takeaway</strong>
                <p>Provide a short summation of key points about the content.</p>
            </div>
        </div>

        <div class="card">
            <div>
                <span class="number">4</span>
                <span class="title">Callouts</span>
            </div>

            <div class="callout">
                <strong><i>Example</i></strong>
                <p>Emphasized text sections visually distinct from the body.</p>
            </div>
        </div>

        <div class="card">
            <div>
                <span class="number">2</span>
                <span class="title">Bullet points</span>
            </div>

            <div class="bullets">
                <ul>
                <li><div style="width:80%"></div></li>
                <li><div style="width:80%"></div></li>
                <li><div style="width:80%"></div></li>
                <li><div style="width:80%"></div></li>
                </ul>
            </div>
        </div>

        <div class="card">
            <div>
                <span class="number">5</span>
                <span class="title">Helpful visuals</span>
            </div>
            <div class="flex">
                <div class="bullets">
                    <ul>
                    <li><div style="width:60%;background:#C9C9CD;"></div></li>
                    <li><div style="width:50%;background:#C9C9CD;"></div></li>
                    <li><div style="width:55%;background:#C9C9CD;"></div></li>
                    <li><div style="width:60%;background:#C9C9CD;"></div></li>
                    </ul>
                </div>
                <img src="img.png"/>
            </div>
        </div>
    </div>

    <div style="margin-top:30px;font-size:24px;">
        <span class="number">3</span>
        <strong>Bolding and <span class="highlight">highlighting</span> key points</strong>
    </div>

</div>
</body>
</html>
